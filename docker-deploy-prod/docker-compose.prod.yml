networks:
  productservice_private:
    driver: bridge
  productservice_public:
    driver: bridge

services:
  caddy:
    image: caddy:2-alpine
    container_name: productservice_caddy
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
      AUTH_DOMAIN: ${AUTH_DOMAIN}
      GRAFANA_DOMAIN: ${GRAFANA_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api
      - keycloak
      - grafana
    networks:
      - productservice_public
      - productservice_private
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: ..
      dockerfile: deploy-docker/Dockerfile
    container_name: productservice_api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_HTTP_PORTS: 9005
      Kestrel__Port: 9005
      DOTNET_RUNNING_IN_CONTAINER: ${DOTNET_RUNNING_IN_CONTAINER}
      ConnectionStrings__PostgresWrite: "Server=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};SSL Mode=Disable;"
      ConnectionStrings__PostgresRead: "Server=postgres_replica;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_READ_USER};Password=${POSTGRES_READ_PASSWORD};SSL Mode=Disable;"
      Auth__Enabled: "true"
      Auth__Authority: "https://${AUTH_DOMAIN}/realms/productservice"
      Auth__BrowserAuthority: "https://${AUTH_DOMAIN}/realms/productservice"
      Auth__Audience: productservice-api
      Auth__RequireHttpsMetadata: "true"
      Redis__ConnectionString: "redis:6379,user=${REDIS_WRITE_USER},password=${REDIS_WRITE_PASSWORD},abortConnect=false,connectTimeout=3000,asyncTimeout=3000,syncTimeout=3000,connectRetry=2"
      Redis__ReadConnectionString: "redis:6379,user=${REDIS_READ_USER},password=${REDIS_READ_PASSWORD},abortConnect=false,connectTimeout=3000,asyncTimeout=3000,syncTimeout=3000,connectRetry=2"
      Redis__WriteConnectionString: "redis:6379,user=${REDIS_WRITE_USER},password=${REDIS_WRITE_PASSWORD},abortConnect=false,connectTimeout=3000,asyncTimeout=3000,syncTimeout=3000,connectRetry=2"
      Redis__InstanceName: "ProductServiceApp:"
      Redis__MaxCachePayloadBytes: 262144
      Redis__OperationTimeoutMilliseconds: 3000
      Redis__CircuitBreakerFailureRatio: 0.5
      Redis__CircuitBreakerMinimumThroughput: 10
      Redis__CircuitBreakerSamplingSeconds: 30
      Redis__CircuitBreakerBreakSeconds: 15
      Redis__ProductsAbsoluteExpirationMinutes: 10
      Redis__ProductsSlidingExpirationMinutes: 2
      Redis__OrdersAbsoluteExpirationMinutes: 10
      Redis__OrdersSlidingExpirationMinutes: 2
      CacheWarmup__Enabled: "true"
      CacheWarmup__RunOnStartup: "true"
      CacheWarmup__BlockStartupUntilComplete: "false"
      CacheWarmup__StartupDelaySeconds: 3
      CacheWarmup__TimeoutSeconds: 20
      CacheWarmup__MaxDegreeOfParallelism: 1
      CacheWarmup__Features__products__Enabled: "true"
      CacheWarmup__Features__products__WarmupAll: "true"
      CacheWarmup__Features__products__WarmupById: "true"
      CacheWarmup__Features__products__MaxItems: 300
      CacheWarmup__Features__orders__Enabled: "true"
      CacheWarmup__Features__orders__WarmupAll: "true"
      CacheWarmup__Features__orders__WarmupById: "false"
      CacheWarmup__Features__orders__MaxItems: 300
      DatabaseSettings__EnableLoadBalancing: "false"
      WorkersReplicas__ReplicasCreateProduct: 1
      WorkersReplicas__ReplicasUpdateProduct: 1
      WorkersReplicas__ReplicasDeleteProduct: 1
      WorkersReplicas__ReplicasGetAllProduct: 1
      WorkersReplicas__ReplicasGetByIdProduct: 1
      WorkersReplicas__ReplicasCreateOrder: 1
      WorkersReplicas__ReplicasUpdateOrder: 1
      WorkersReplicas__ReplicasDeleteOrder: 1
      WorkersReplicas__ReplicasGetAllOrder: 1
      WorkersReplicas__ReplicasGetByIdOrder: 1
      QueueCapacity__QueueCreateProduct: 100
      QueueCapacity__QueueUpdateProduct: 100
      QueueCapacity__QueueDeleteProduct: 100
      QueueCapacity__QueueCreateOrder: 100
      QueueCapacity__QueueUpdateOrder: 100
      QueueCapacity__QueueDeleteOrder: 100
      RetryPolicy__MaxRetryAttempts: 3
      RetryPolicy__DelayBetweenRetriesInSeconds: 2
      KeepAliveTimeoutSeconds: 30
      RequestTimeoutSeconds: 15
      Serilog__MinimumLevel__Default: Information
      Serilog__MinimumLevel__Override__Microsoft: Warning
      Serilog__MinimumLevel__Override__Microsoft.EntityFrameworkCore.Database.Command: Warning
    volumes:
      - api_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      postgres_replica:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - productservice_private
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  web:
    build:
      context: ..
      dockerfile: deploy-docker/Dockerfile.web
    container_name: productservice_web
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_HTTP_PORTS: 8080
      Kestrel__Port: 8080
      DOTNET_RUNNING_IN_CONTAINER: ${DOTNET_RUNNING_IN_CONTAINER}
      Auth__Authority: "https://${AUTH_DOMAIN}/realms/productservice"
      Auth__BrowserAuthority: "https://${AUTH_DOMAIN}/realms/productservice"
      Auth__ClientId: ${KEYCLOAK_CLIENT_WEB}
      Auth__RequireHttpsMetadata: "true"
      ProductApi__BaseAddress: http://api:9005
    depends_on:
      - api
    networks:
      - productservice_private
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:17
    container_name: productservice_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_KEYCLOAK_DB: ${POSTGRES_KEYCLOAK_DB}
      POSTGRES_KEYCLOAK_USER: ${POSTGRES_KEYCLOAK_USER}
      POSTGRES_KEYCLOAK_PASSWORD: ${POSTGRES_KEYCLOAK_PASSWORD}
      POSTGRES_READ_USER: ${POSTGRES_READ_USER}
      POSTGRES_READ_PASSWORD: ${POSTGRES_READ_PASSWORD}
      POSTGRES_REPLICATION_USER: ${POSTGRES_REPLICATION_USER}
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/primary/postgresql.conf:/etc/postgresql/primary/postgresql.conf:ro
      - ./postgres/primary/pg_hba.conf:/etc/postgresql/primary/pg_hba.conf:ro
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    command:
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/primary/postgresql.conf"
      - "-c"
      - "hba_file=/etc/postgresql/primary/pg_hba.conf"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - productservice_private
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  postgres_replica:
    image: postgres:17
    container_name: productservice_postgres_replica
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_REPLICATION_USER: ${POSTGRES_REPLICATION_USER}
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
      POSTGRES_PRIMARY_HOST: postgres
      POSTGRES_PRIMARY_PORT: 5432
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
      - ./postgres/replica/postgresql.conf:/etc/postgresql/replica/postgresql.conf:ro
      - ./postgres/replica/replica-entrypoint.sh:/replica-entrypoint.sh:ro
    entrypoint:
      - "/bin/bash"
      - "/replica-entrypoint.sh"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U ${POSTGRES_READ_USER:-${POSTGRES_USER}} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - productservice_private
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    container_name: productservice_redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - ./redis/users.acl:/usr/local/etc/redis/users.acl:ro
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--user", "${REDIS_WRITE_USER}", "-a", "${REDIS_WRITE_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - productservice_private
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  redis_exporter:
    image: oliver006/redis_exporter:latest
    container_name: productservice_redis_exporter
    restart: unless-stopped
    command:
      - "--redis.addr=redis://redis:6379"
      - "--redis.user=${REDIS_METRICS_USER}"
      - "--redis.password=${REDIS_METRICS_PASSWORD}"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - productservice_private
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: productservice_keycloak
    restart: unless-stopped
    command:
      - start
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: "jdbc:postgresql://postgres:5432/${POSTGRES_KEYCLOAK_DB}"
      KC_DB_USERNAME: ${POSTGRES_KEYCLOAK_USER}
      KC_DB_PASSWORD: ${POSTGRES_KEYCLOAK_PASSWORD}
      KC_HOSTNAME: "https://${AUTH_DOMAIN}"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
    volumes:
      - ../deploy-docker/keycloak/realm-productservice.json:/opt/keycloak/data/import/realm-productservice.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - productservice_private
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:latest
    container_name: productservice_prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=3d"
      - "--storage.tsdb.retention.size=2GB"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - api
      - redis_exporter
    networks:
      - productservice_private
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:latest
    container_name: productservice_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: "https://${GRAFANA_DOMAIN}"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../deploy-docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../deploy-docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - productservice_private
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  k6:
    image: grafana/k6:latest
    container_name: productservice_k6
    profiles:
      - loadtest
    environment:
      BASE_URL: http://api:9005
      AUTH_URL: https://${AUTH_DOMAIN}
      AUTH_REALM: productservice
      AUTH_CLIENT_ID: ${KEYCLOAK_CLIENT_WEB}
      AUTH_USERNAME: admin
      AUTH_PASSWORD: admin123
    volumes:
      - ./load-tests:/scripts:ro
    networks:
      - productservice_private
    entrypoint:
      - k6
      - run
      - /scripts/authenticated-crud.js

volumes:
  api_logs:
  caddy_data:
  caddy_config:
  grafana_data:
  postgres_data:
  postgres_replica_data:
  prometheus_data:
  redis_data:
