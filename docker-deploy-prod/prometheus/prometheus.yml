global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: productservice_api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:9005

  - job_name: redis
    static_configs:
      - targets:
          - redis_exporter:9121

  - job_name: node_exporter
    static_configs:
      - targets:
          - node_exporter:9100

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080
