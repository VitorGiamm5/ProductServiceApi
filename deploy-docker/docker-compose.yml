networks:
  6137_webnet:
    driver: bridge

services:

  # ─── PRIMARY ───────────────────────────────────────────────
  6137_postgres_primary:
    image: postgres:17
    container_name: 6137_postgres_primary
    restart: always
    environment:
      POSTGRES_USER: randandan
      POSTGRES_PASSWORD: randandan_XLR
      POSTGRES_DB: dbproducts
    volumes:
      - 6137_pgdata_primary:/var/lib/postgresql/data
      - ./primary/postgresql.conf:/etc/primary/postgresql.conf
      - ./primary/pg_hba.conf:/etc/primary/pg_hba.conf
      - ./init:/docker-entrypoint-initdb.d
    command: >
      postgres
        -c config_file=/etc/primary/postgresql.conf
        -c hba_file=/etc/primary/pg_hba.conf
    ports:
      - "9000:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U randandan -d dbproducts"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - 6137_webnet

  # ─── REPLICA ───────────────────────────────────────────────
  6137_postgres_replica:
    image: postgres:17
    container_name: 6137_postgres_replica
    user: postgres
    volumes:
      - 6137_pgdata_replica:/var/lib/postgresql/data
      - ./replica/postgresql.conf:/etc/replica/postgresql.conf
      - ./replica/replica-entrypoint.sh:/replica-entrypoint.sh
    entrypoint: ["/bin/bash", "/replica-entrypoint.sh"]
    ports:
      - "9001:5433"
    depends_on:
      6137_postgres_primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5433 -U randandan -d dbproducts"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - 6137_webnet

  # ─── API ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: 6137_redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - ./redis/users.acl:/usr/local/etc/redis/users.acl:ro
      - 6137_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--user", "productservice_admin", "-a", "productservice_admin_XLR", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - 6137_webnet

  redis_exporter:
    image: oliver006/redis_exporter:latest
    container_name: 6137_redis_exporter
    restart: always
    command:
      - "--redis.addr=redis://redis:6379"
      - "--redis.user=productservice_metrics"
      - "--redis.password=productservice_metrics_XLR"
    ports:
      - "127.0.0.1:9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - 6137_webnet

  6137_api_product_service:
    build:
      context: ..
      dockerfile: deploy-docker/Dockerfile
    container_name: 6137_api_product_service
    user: root
    entrypoint: ["/bin/sh", "-c", "chown -R appuser:appuser /app/logs && exec runuser -u appuser -- dotnet ProductServiceApp.Api.dll"]
    ports:
      - "9005:9005"
    volumes:
      - 6137_api_logs:/app/logs
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Kestrel__Port=9005
      - DOTNET_RUNNING_IN_CONTAINER=true
      - ConnectionStrings__PostgresWrite=Server=6137_postgres_primary;Port=5432;Database=dbproducts;Username=randandan;Password=randandan_XLR;SSL Mode=Disable;
      - ConnectionStrings__PostgresRead=Server=6137_postgres_replica;Port=5433;Database=dbproducts;Username=read_randandan;Password=read_randandan_XLR;SSL Mode=Disable;
      - Auth__Enabled=true
      - Auth__Authority=http://keycloak:8080/realms/productservice
      - Auth__BrowserAuthority=http://localhost:8081/realms/productservice
      - Auth__Audience=productservice-api
      - Auth__RequireHttpsMetadata=false
      - Redis__ConnectionString=redis:6379,user=productservice_write,password=productservice_write_XLR,abortConnect=false,connectTimeout=3000,asyncTimeout=3000,syncTimeout=3000,connectRetry=2
      - Redis__ReadConnectionString=redis:6379,user=productservice_read,password=productservice_read_XLR,abortConnect=false,connectTimeout=3000,asyncTimeout=3000,syncTimeout=3000,connectRetry=2
      - Redis__WriteConnectionString=redis:6379,user=productservice_write,password=productservice_write_XLR,abortConnect=false,connectTimeout=3000,asyncTimeout=3000,syncTimeout=3000,connectRetry=2
      - "Redis__InstanceName=ProductServiceApp:"
      - Redis__MaxCachePayloadBytes=262144
      - Redis__OperationTimeoutMilliseconds=3000
      - Redis__CircuitBreakerFailureRatio=0.5
      - Redis__CircuitBreakerMinimumThroughput=10
      - Redis__CircuitBreakerSamplingSeconds=30
      - Redis__CircuitBreakerBreakSeconds=15
      - Redis__ProductsAbsoluteExpirationMinutes=10
      - Redis__ProductsSlidingExpirationMinutes=2
      - Redis__OrdersAbsoluteExpirationMinutes=10
      - Redis__OrdersSlidingExpirationMinutes=2
      - CacheWarmup__Enabled=true
      - CacheWarmup__RunOnStartup=true
      - CacheWarmup__BlockStartupUntilComplete=false
      - CacheWarmup__StartupDelaySeconds=3
      - CacheWarmup__TimeoutSeconds=20
      - CacheWarmup__MaxDegreeOfParallelism=2
      - CacheWarmup__Features__products__Enabled=true
      - CacheWarmup__Features__products__WarmupAll=true
      - CacheWarmup__Features__products__WarmupById=true
      - CacheWarmup__Features__products__MaxItems=500
      - CacheWarmup__Features__orders__Enabled=true
      - CacheWarmup__Features__orders__WarmupAll=true
      - CacheWarmup__Features__orders__WarmupById=false
      - CacheWarmup__Features__orders__MaxItems=500
      - DatabaseSettings__EnableLoadBalancing=true
      - WorkersReplicas__ReplicasCreateProduct=1
      - WorkersReplicas__ReplicasUpdateProduct=1
      - WorkersReplicas__ReplicasDeleteProduct=1
      - WorkersReplicas__ReplicasGetAllProduct=1
      - WorkersReplicas__ReplicasGetByIdProduct=1
      - WorkersReplicas__ReplicasCreateOrder=1
      - WorkersReplicas__ReplicasUpdateOrder=1
      - WorkersReplicas__ReplicasDeleteOrder=1
      - WorkersReplicas__ReplicasGetAllOrder=1
      - WorkersReplicas__ReplicasGetByIdOrder=1
      - QueueCapacity__QueueCreateProduct=100
      - QueueCapacity__QueueUpdateProduct=100
      - QueueCapacity__QueueDeleteProduct=100
      - QueueCapacity__QueueCreateOrder=100
      - QueueCapacity__QueueUpdateOrder=100
      - QueueCapacity__QueueDeleteOrder=100
      - RetryPolicy__MaxRetryAttempts=3
      - RetryPolicy__DelayBetweenRetriesInSeconds=2
      - KeepAliveTimeoutSeconds=30
      - RequestTimeoutSeconds=15
      - Serilog__MinimumLevel__Default=Information
      - Serilog__Properties__Environment=Production
    depends_on:
      6137_postgres_primary:
        condition: service_healthy
      6137_postgres_replica:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - 6137_webnet

  6137_web_product_service:
    build:
      context: ..
      dockerfile: deploy-docker/Dockerfile.web
    container_name: 6137_web_product_service
    restart: always
    ports:
      - "9010:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8080
      - Kestrel__Port=8080
      - DOTNET_RUNNING_IN_CONTAINER=true
      - Auth__Authority=http://keycloak:8080/realms/productservice
      - Auth__BrowserAuthority=http://localhost:8081/realms/productservice
      - Auth__ClientId=productservice-dev-blazor
      - Auth__RequireHttpsMetadata=false
      - ProductApi__BaseAddress=http://6137_api_product_service:9005
    depends_on:
      - 6137_api_product_service
    networks:
      - 6137_webnet

  6137_bff_product_service:
    build:
      context: ..
      dockerfile: deploy-docker/Dockerfile.bff
    container_name: 6137_bff_product_service
    restart: always
    ports:
      - "9020:9020"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=9020
      - DOTNET_RUNNING_IN_CONTAINER=true
      - Kestrel__Port=9020
      - Auth__Authority=http://keycloak:8080/realms/productservice
      - Auth__BrowserAuthority=http://localhost:8081/realms/productservice
      - Auth__ClientId=productservice-bff
      - Auth__ClientSecret=productservice-bff-secret
      - Auth__RequireHttpsMetadata=false
      - ProductApi__BaseAddress=http://6137_api_product_service:9005
    depends_on:
      - 6137_api_product_service
      - keycloak
    networks:
      - 6137_webnet

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: 6137_keycloak
    command: start-dev --import-realm
    ports:
      - "8081:8080"
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
    volumes:
      - ./keycloak/realm-productservice.json:/opt/keycloak/data/import/realm-productservice.json:ro
    networks:
      - 6137_webnet

  # ─── Monitoring and metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: 6137_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - 6137_api_product_service
      - redis_exporter
    networks:
      - 6137_webnet

  loki:
    image: grafana/loki:latest
    container_name: 6137_loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - 6137_webnet

  promtail:
    image: grafana/promtail:latest
    container_name: 6137_promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./promtail.yml:/etc/promtail/config.yml
      - 6137_api_logs:/app/logs:ro
    depends_on:
      - loki
      - 6137_api_product_service
    networks:
      - 6137_webnet

  grafana:
    image: grafana/grafana:latest
    container_name: 6137_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/product-service-overview.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
      - loki
    networks:
      - 6137_webnet

volumes:
  6137_pgdata_primary:
  6137_pgdata_replica:
  6137_api_logs:
  6137_redis_data:
