networks:
  6137_webnet:
    driver: bridge

services:

  # ─── PRIMARY ───────────────────────────────────────────────
  6137_postgres_primary:
    image: postgres:17
    container_name: 6137_postgres_primary
    restart: always
    environment:
      POSTGRES_USER: randandan
      POSTGRES_PASSWORD: randandan_XLR
      POSTGRES_DB: dbproducts
    volumes:
      - 6137_pgdata_primary:/var/lib/postgresql/data
      - ./primary/postgresql.conf:/etc/primary/postgresql.conf
      - ./primary/pg_hba.conf:/etc/primary/pg_hba.conf
      - ./init:/docker-entrypoint-initdb.d
    command: >
      postgres
        -c config_file=/etc/primary/postgresql.conf
        -c hba_file=/etc/primary/pg_hba.conf
    ports:
      - "9000:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U randandan -d dbproducts"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - 6137_webnet

  # ─── REPLICA ───────────────────────────────────────────────
  6137_postgres_replica:
    image: postgres:17
    container_name: 6137_postgres_replica
    user: postgres
    volumes:
      - 6137_pgdata_replica:/var/lib/postgresql/data
      - ./replica/postgresql.conf:/etc/replica/postgresql.conf
      - ./replica/replica-entrypoint.sh:/replica-entrypoint.sh
    entrypoint: ["/bin/bash", "/replica-entrypoint.sh"]
    ports:
      - "9001:5433"
    depends_on:
      6137_postgres_primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5433 -U randandan -d dbproducts"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - 6137_webnet

  # ─── API ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: 6137_redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - 6137_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - 6137_webnet

  6137_api_product_service:
    build:
      context: ..
      dockerfile: deploy-docker/Dockerfile
    container_name: 6137_api_product_service
    user: root
    entrypoint: ["/bin/sh", "-c", "chown -R appuser:appuser /app/logs && exec runuser -u appuser -- dotnet ProductServiceApp.Api.dll"]
    ports:
      - "9005:9005"
    volumes:
      - 6137_api_logs:/app/logs
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Kestrel__Port=9005
      - DOTNET_RUNNING_IN_CONTAINER=true
      - ConnectionStrings__PostgresWrite=Server=6137_postgres_primary;Port=5432;Database=dbproducts;Username=randandan;Password=randandan_XLR;SSL Mode=Disable;
      - ConnectionStrings__PostgresRead=Server=6137_postgres_replica;Port=5433;Database=dbproducts;Username=read_randandan;Password=read_randandan_XLR;SSL Mode=Disable;
      - Redis__ConnectionString=redis:6379
      - "Redis__InstanceName=ProductServiceApp:"
      - Redis__ProductsAbsoluteExpirationMinutes=10
      - Redis__ProductsSlidingExpirationMinutes=2
      - DatabaseSettings__EnableLoadBalancing=true
      - WorkersReplicas__ReplicasCreateProduct=2
      - WorkersReplicas__ReplicasUpdateProduct=2
      - WorkersReplicas__ReplicasDeleteProduct=2
      - WorkersReplicas__ReplicasGetAllProduct=1
      - WorkersReplicas__ReplicasGetByIdProduct=1
      - QueueCapacity__QueueCreateProduct=100
      - QueueCapacity__QueueUpdateProduct=100
      - QueueCapacity__QueueDeleteProduct=100
      - RetryPolicy__MaxRetryAttempts=3
      - RetryPolicy__DelayBetweenRetriesInSeconds=2
      - KeepAliveTimeoutSeconds=30
      - RequestTimeoutSeconds=15
      - Serilog__MinimumLevel__Default=Information
      - Serilog__Properties__Environment=Production
    depends_on:
      6137_postgres_primary:
        condition: service_healthy
      6137_postgres_replica:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - 6137_webnet

  # ─── Monitoring and metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: 6137_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - 6137_api_product_service
    networks:
      - 6137_webnet

  loki:
    image: grafana/loki:latest
    container_name: 6137_loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - 6137_webnet

  promtail:
    image: grafana/promtail:latest
    container_name: 6137_promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./promtail.yml:/etc/promtail/config.yml
      - 6137_api_logs:/app/logs:ro
    depends_on:
      - loki
      - 6137_api_product_service
    networks:
      - 6137_webnet

  grafana:
    image: grafana/grafana:latest
    container_name: 6137_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/product-service-overview.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
      - loki
    networks:
      - 6137_webnet

volumes:
  6137_pgdata_primary:
  6137_pgdata_replica:
  6137_api_logs:
  6137_redis_data:
